# NOT for Hostinger VPS — Docker Swarm `configs:` only (plain docker compose will fail).
# Use deploy-compose.yml (base64 embed) or docker-compose.yml (local volume) instead.
services:
  web:
    image: nginx:alpine
    restart: always
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - "traefik.http.routers.grad.rule=Host(`grad.iconstudio.tech`)"
      - traefik.http.routers.grad.entrypoints=web,websecure
      - traefik.http.routers.grad.tls=true
      - traefik.http.routers.grad.tls.certresolver=mytlschallenge
      - traefik.http.services.grad.loadbalancer.server.port=80
    configs:
      - source: index_html
        target: /usr/share/nginx/html/index.html

networks:
  n8n_default:
    external: true

configs:
  index_html:
    external: true
